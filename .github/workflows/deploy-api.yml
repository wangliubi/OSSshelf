name: Deploy API to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @osshelf/shared build

      - name: Create Vectorize index
        run: |
          npx wrangler vectorize create ossshelf-files --dimensions=768 --metric=cosine || echo "Index may already exist, continuing..."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate wrangler.toml
        run: |
          cat > apps/api/wrangler.toml << EOF
          name = "ossshelf-api"
          main = "src/index.ts"
          compatibility_date = "2024-01-01"
          compatibility_flags = ["nodejs_compat"]

          [ai]
          binding = "AI"

          [[vectorize]]
          binding = "VECTORIZE"
          index_name = "ossshelf-files"

          [[d1_databases]]
          binding = "DB"
          database_name = "ossshelf-db"
          database_id = "${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}"

          [[kv_namespaces]]
          binding = "KV"
          id = "${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}"

          [observability]
          enabled = false
          head_sampling_rate = 1

          [observability.logs]
          enabled = true
          head_sampling_rate = 1
          persist = true
          invocation_logs = true

          [vars]
          ENVIRONMENT = "production"
          JWT_SECRET = "${{ secrets.JWT_SECRET }}"
          CORS_ORIGINS = "${{ secrets.CORS_ORIGINS }}"
          TRASH_RETENTION_DAYS = "${{ secrets.TRASH_RETENTION_DAYS || '30' }}"
          ALERT_TG_BOT_TOKEN = "${{ secrets.ALERT_TG_BOT_TOKEN }}"
          ALERT_TG_CHAT_ID = "${{ secrets.ALERT_TG_CHAT_ID }}"

          [triggers]
          crons = ["0 3 * * *"]
          EOF

      - name: Deploy to Cloudflare Workers
        run: pnpm deploy:api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
